# 1. Configuración de la aplicación
spring.application.name=meat-grill

# 2. Configuración de la base de datos PostgreSQL
# Reemplaza 'tu_usuario' y 'tu_password' con las variables correspondientes
spring.datasource.url=jdbc:postgresql://localhost:5432/meatandgrill
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. Configuración de Hibernate / JPA para Postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect